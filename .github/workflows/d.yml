name: Download Song

on:
  workflow_dispatch:
    inputs:
      song:
        description: "Song name to search and download"
        required: true
        default: "lofi hip hop"

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install yt-dlp and ffmpeg
        run: |
          pip install yt-dlp
          sudo apt-get install -y ffmpeg -q

      - name: Search and download first result
        run: |
          SONG="${{ github.event.inputs.song }}"
          echo "Searching for: $SONG"
          mkdir -p downloads

          yt-dlp \
            --default-search "ytsearch1:" \
            --extract-audio \
            --audio-format mp3 \
            --audio-quality 192K \
            --output "downloads/%(title)s.%(ext)s" \
            --print "before_dl:%(title)s ? %(webpage_url)s" \
            --no-playlist \
            "$SONG"

      - name: Show result
        run: ls -lh downloads/

      - name: Upload MP3
        uses: actions/upload-artifact@v4
        with:
          name: "${{ github.event.inputs.song }}"
          path: downloads/
          if-no-files-found: error
          retention-days: 1