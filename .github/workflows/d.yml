name: Download Song

on:
  workflow_dispatch:
    inputs:
      song:
        description: "Song name to search and download"
        required: true
        default: "Blinding Lights"

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install requests pyDes

      - name: Search and download
        run: python download.py "${{ github.event.inputs.song }}"

      - name: Show result
        run: ls -lh downloads/ 2>/dev/null || echo "No files downloaded"

      - name: Upload song
        uses: actions/upload-artifact@v4
        with:
          name: "${{ github.event.inputs.song }}"
          path: downloads/
          if-no-files-found: error
          retention-days: 1